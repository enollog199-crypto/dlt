<!DOCTYPE html>
<html>
<head>
    <title>注册 - 赛博大乐透</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="container">
    <div class="card" style="max-width: 400px; margin: 100px auto;">
        <h2>用户注册</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="用户名" required style="width:100%; margin-bottom:10px;">
            <input type="password" name="password" placeholder="密码" required style="width:100%; margin-bottom:10px;">
            <button type="submit" style="background: #ff00ff; color: white; border: none; padding: 10px; width: 100%;">立即注册</button>
        </form>
        <p><a href="{{ url_for('login') }}" style="color: #00ffcc;">已有账号？去登录</a></p>
    </div>
</body>
</html>
