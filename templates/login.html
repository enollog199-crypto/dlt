<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 赛博大乐透 AI 系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(10, 15, 25, 0.9);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            border-radius: 15px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #1a1a2e;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #ff00ff;
            color: #ff00ff;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 15px #ff00ff;
        }
        .msg { color: #ff4d4d; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #00ffcc; text-shadow: 0 0 10px #00ffcc;">SYSTEM ACCESS</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="IDENTIFIER / 用户名" required>
            <input type="password" name="password" placeholder="PASSCODE / 密码" required>
            <button type="submit">执行登录</button>
        </form>
        <p style="margin-top:20px;">
            <a href="{{ url_for('register') }}" style="color: #666; text-decoration: none;">新用户注册 / Register</a>
        </p>
    </div>
</body>
</html>
